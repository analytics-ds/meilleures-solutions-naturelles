baseURL = "https://meilleuresolutionnaturelle.fr/"
languageCode = "fr"
title = "Ma Bonne Sante"
theme = "msn-theme"
paginate = 12

[taxonomies]
  category = "categories"
  tag = "tags"

# Menu principal (Accueil + Blog, les dropdowns Domaines/Besoins sont geres dans le header partial)
[[menus.main]]
  name = "Accueil"
  pageRef = "/"
  weight = 1

[[menus.main]]
  name = "Blog"
  pageRef = "/blog"
  weight = 4

[params]
  description = "Guide expert en sante naturelle et bien-etre : aromatherapie, gemmotherapie, fleurs de Bach, huiles essentielles et complements alimentaires. Des solutions naturelles pour chaque besoin, validees par la science."
  author_name = "La Redaction"
  author_url = "https://meilleuresolutionnaturelle.fr/"
  author_job_title = "Equipe editoriale"
  author_bio = "L'equipe editoriale de Ma Bonne Sante reunit des passionnes de sante naturelle et de bien-etre. Chaque article est documente a partir de sources scientifiques fiables et redige dans le respect des bonnes pratiques YMYL."
  logo = "images/logo.png"

  # Categories par domaine (modalites therapeutiques)
  domaines = ["Aromatherapie", "Huiles Essentielles", "Huiles Vegetales", "Gemmotherapie", "Fleurs de Bach", "Complements Alimentaires"]

  # Categories par besoin (usages sante et bien-etre)
  besoins = ["Immunite et Defenses", "Sommeil et Detente", "Douleurs et Articulations", "Bien-etre Feminin", "Digestion et Detox", "Minceur et Drainage", "Beaute et Soins", "Stress et Equilibre emotionnel", "Peurs et Angoisses", "Confiance et Estime de Soi", "Respiration", "Nuisibles"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changeFreq = "weekly"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

# Desactiver la minification XML pour avoir un sitemap lisible
[minify]
  disableXML = true


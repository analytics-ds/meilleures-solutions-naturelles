# Auteurs du blog — multilingue FR/EN
# Ce fichier est copie dans `data/authors.yaml` a la racine du site Hugo a la creation du site.
# Hugo le lit nativement via `.Site.Data.authors` dans les templates.
#
# Structure : map d'auteurs indexee par ID (slug)
# L'ID est utilise dans le frontmatter des articles comme `author: thomas-durand`
#
# Le champ `topics` sert a la selection automatique de l'auteur dans /create-article-geo.
# Le champ `expertise` alimente le schema.org Person -> knowsAbout.

